<!DOCTYPE html>
<html>
<head>
    <title>TP MOD 2</title>
    <style>
        table {
            width: 400px;
            height: 300px;
            border-collapse: collapse;
            margin: 20px auto;
            font-size: 24px;
            font-weight: bold;
        }
        td {
            border: 2px solid black;
            text-align: center;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <td rowspan="1">A</td> 
            <td colspan="2">
                <table style="width:60%; height:80%; border-collapse: collapse;">
                    <tr>
                        <td style="border:2px solid black;">B</td>
                        <td style="border:2px solid black;">C</td>
                    </tr>
                    <tr>
                        <td style="border:2px solid black;">D</td>
                        <td style="border:2px solid black;">E</td>
                    </tr>
                </table>
            </td>
        </tr>
        <tr>
            <td colspan = "1">F</td>
            <td colspan = "2">G</td>
        </tr>
    </table>
</body>
</html>
